<!doctype html>
<html class="desktop">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: inherit;
        gap: 12px;
      }
      @keyframes loading-draw {
        0% {
          stroke-dashoffset: 8000;
        }
        100% {
          stroke-dashoffset: 0;
        }
      }
      @keyframes loading-fill {
        30% {
          fill-opacity: 0.05;
        }
        100% {
          fill-opacity: 1;
        }
      }
      #loading-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        color: #1f1f1f;
      }
      #loading-brand svg text {
        fill: currentcolor;
        fill-opacity: 0;
        stroke: currentcolor;
        stroke-dasharray: 8000;
        stroke-dashoffset: 8000;
        stroke-width: 4;
        animation:
          loading-draw 2s cubic-bezier(0.4, 0, 0.2, 1) infinite,
          loading-fill 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      html[data-theme='dark'] #loading-brand {
        color: #f0f0f0;
      }
    </style>
  </head>
  <body style="height: 100%">
    <script>
      (function () {
        var theme = 'system';
        try {
          theme = localStorage.getItem('theme') || 'system';
        } catch (_) {}
        var systemTheme =
          window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light';
        var resolvedTheme = theme === 'system' ? systemTheme : theme;
        if (resolvedTheme === 'dark' || resolvedTheme === 'light') {
          document.documentElement.setAttribute('data-theme', resolvedTheme);
        }
        // Renderer-side reloads (Cmd+R / webContents.reload) don't go through
        // the main process's `?lng=` injection, so prefer the i18next cache —
        // the actual user setting persisted by the language switcher — before
        // falling back to the URL param or navigator detection.
        var urlParams = new URLSearchParams(window.location.search);
        var locale;
        try {
          locale = localStorage.getItem('i18nextLng');
        } catch (_) {}
        if (!locale) locale = urlParams.get('lng') || navigator.language || 'en-US';
        document.documentElement.lang = locale;
        var rtl = ['ar', 'arc', 'dv', 'fa', 'ha', 'he', 'khw', 'ks', 'ku', 'ps', 'ur', 'yi'];
        document.documentElement.dir =
          rtl.indexOf(locale.split('-')[0].toLowerCase()) >= 0 ? 'rtl' : 'ltr';
      })();
    </script>
    <div id="loading-screen">
      <div id="loading-brand" aria-label="Loading" role="status">
        <svg
          height="40"
          style="flex: none; line-height: 1"
          viewBox="0 0 940 320"
          xmlns="http://www.w3.org/2000/svg"
        >
          <title>Hubstr</title>
          <text
            font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif"
            font-size="262"
            font-weight="700"
            letter-spacing="-6"
            text-anchor="middle"
            x="470"
            y="264"
          >Hubstr</text>
        </svg>
      </div>
    </div>
    <div id="root" style="height: 100%"></div>
    <script>
      window.__SERVER_CONFIG__ = undefined;
    </script>
    <script type="module" src="../../src/spa/entry.desktop.tsx"></script>
  </body>
</html>
